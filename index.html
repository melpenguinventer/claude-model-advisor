                    bedrock_claude: { name: 'Claude (via AWS Bedrock)', description: 'Claude through AWS', color: 'from-orange-500 to-yellow-500', provider: 'AWS', bestFor: ['Enterprise deployment', 'AWS integration', 'VPC-private inference', 'Compliance-heavy work'], costs: '$0.80-5 per 1M tokens', speed: 'Moderate', accuracy: '~80%', context: '1M tokens', tier: 'paid', trust: 'high', pros: ['Enterprise grade', 'VPC private', 'AWS integration', 'Compliance ready'], cons: ['AWS dependency', 'Setup required', 'Higher cost overhead'] },

            getRelevantQuestions() {
                const taskLower = this.answers.taskDescription.toLowerCase();
                const questions = [];

                // Always ask about speed and accuracy
                questions.push('speed', 'accuracy');

                // Ask about context if relevant
                const contextKeywords = ['code', 'document', 'paper', 'analyze', 'file', 'review', 'read', 'process', 'parse', 'extract', 'summarize', 'research', 'codebase', 'database', 'article', 'book', 'report'];
                if (contextKeywords.some(kw => taskLower.includes(kw))) {
                    questions.push('context');
                }

                // Ask about volume if it seems like a repeated/scalable task
                const volumeKeywords = ['build', 'write', 'process', 'filter', 'extract', 'generate', 'create', 'batch', 'multiple', 'many', 'dozens', 'hundreds', 'daily', 'weekly', 'regularly', 'every'];
                if (volumeKeywords.some(kw => taskLower.includes(kw))) {
                    questions.push('volume');
                }

                return questions;
            }

            scoreModel() {
                if (!this.answers.taskDescription.trim()) return null;
                let scores = { haiku_free: 0, haiku: 0, sonnet: 0, opus: 0, gpt4o_mini: 0, gpt4o: 0, gpt4turbo: 0, gemini_free: 0, gemini: 0, copilot_free: 0, copilot_pro: 0, llama2: 0, llama3: 0, mistral: 0, mixtral: 0, phi: 0, qwen: 0, perplexity: 0, groq: 0, together_mistral: 0, bedrock_claude: 0, bedrock_llama: 0, huggingface: 0 };
                let complexity = this.answers.complexity;

                if (this.complexityHelperStep > 0) {
                    const helperScore = Object.values(this.helperAnswers).filter(v => v === true).length;
                    if (helperScore >= 3) complexity = 'complex';
                    else if (helperScore >= 2) complexity = 'medium';
                    else complexity = 'simple';
                }

                const taskLower = this.answers.taskDescription.toLowerCase();
                const isVision = taskLower.includes('vision') || taskLower.includes('image') || taskLower.includes('photo') || taskLower.includes('picture');
                const isCoding = taskLower.includes('code') || taskLower.includes('debug') || taskLower.includes('script');
                const isWriting = taskLower.includes('write') || taskLower.includes('blog') || taskLower.includes('article') || taskLower.includes('story');
                const isAnalysis = taskLower.includes('analyze') || taskLower.includes('summary') || taskLower.includes('research');
                const isWebSearch = taskLower.includes('search') || taskLower.includes('current') || taskLower.includes('latest') || taskLower.includes('recent');
                const isEmbedded = taskLower.includes('edge') || taskLower.includes('mobile') || taskLower.includes('device') || taskLower.includes('lightweight');
                const isMultilingual = taskLower.includes('chinese') || taskLower.includes('multilingual') || taskLower.includes('international');
                const needsHosting = taskLower.includes('self-hosted') || taskLower.includes('self-host') || taskLower.includes('deploy') || taskLower.includes('private');
                const needsSpeed = taskLower.includes('latency') || taskLower.includes('real-time') || taskLower.includes('stream');

                if (complexity === 'simple') { scores.haiku_free += 3; scores.haiku += 3; scores.gpt4o_mini += 2; scores.gemini_free += 2; scores.copilot_free += 2; scores.phi += 3; scores.mistral += 2; }
                if (complexity === 'medium') { scores.sonnet += 3; scores.gpt4turbo += 2; scores.copilot_free += 1; scores.llama3 += 1; scores.mixtral += 2; }
                if (complexity === 'complex') { scores.opus += 3; scores.gpt4o += 2; scores.copilot_pro += 2; scores.qwen += 2; scores.mixtral += 1; }
                if (complexity === 'critical') { scores.opus += 4; scores.gpt4o += 2; scores.copilot_pro += 2; scores.bedrock_claude += 2; }

                if (this.answers.speed === 'instant') { scores.haiku_free += 2; scores.haiku += 2; scores.gemini_free += 3; scores.gpt4o_mini += 2; scores.copilot_free += 2; scores.phi += 3; scores.groq += 3; scores.mistral += 2; }
                if (this.answers.speed === 'fast') { scores.sonnet += 2; scores.gpt4turbo += 1; scores.mixtral += 1; scores.together_mistral += 1; }
                if (this.answers.speed === 'thorough') { scores.opus += 1; scores.gpt4o += 1; scores.copilot_pro += 1; scores.bedrock_claude += 1; }

                if (this.answers.context === 'small') { scores.haiku_free += 1; scores.gpt4o_mini += 1; scores.phi += 2; }
                if (this.answers.context === 'medium') { scores.sonnet += 1; scores.gpt4o += 1; scores.llama3 += 1; }
                if (this.answers.context === 'large') { scores.sonnet += 2; scores.gpt4o += 1; scores.mixtral += 1; }
                if (this.answers.context === 'massive') { scores.opus += 3; scores.gemini += 3; scores.gemini_free += 2; scores.mixtral += 2; scores.perplexity += 2; }

                if (this.answers.volume === 'high') { scores.haiku_free += 1; scores.gemini_free += 2; scores.groq += 2; }
                if (this.answers.volume === 'medium') { scores.sonnet += 1; scores.gpt4turbo += 1; }
                if (this.answers.volume === 'low') { scores.opus += 1; scores.gpt4o += 1; }

                if (this.answers.accuracy === 'good-enough') { scores.haiku_free += 1; scores.gemini_free += 1; scores.copilot_free += 1; scores.phi += 1; }
                if (this.answers.accuracy === 'reliable') { scores.sonnet += 1; scores.gpt4turbo += 1; scores.copilot_pro += 1; scores.llama3 += 1; scores.mixtral += 1; }
                if (this.answers.accuracy === 'mission-critical') { scores.opus += 3; scores.gpt4o += 2; scores.copilot_pro += 1; scores.bedrock_claude += 2; scores.qwen += 1; }

                if (isVision) { scores.gpt4o += 3; scores.gemini += 2; scores.gpt4o_mini += 1; }
                if (isCoding) { scores.sonnet += 2; scores.gpt4turbo += 1; scores.opus += 1; scores.llama3 += 1; }
                if (isWriting) { scores.sonnet += 2; scores.opus += 1; scores.copilot_pro += 1; scores.gpt4o += 1; }
                if (isAnalysis) { scores.sonnet += 1; scores.gpt4turbo += 1; scores.copilot_free += 1; scores.qwen += 1; }
                if (isWebSearch) { scores.copilot_free += 3; scores.copilot_pro += 2; scores.perplexity += 3; }
                if (isEmbedded) { scores.phi += 3; scores.mistral += 2; scores.llama2 += 1; }
                if (isMultilingual) { scores.qwen += 3; scores.gemini += 1; }
                if (needsHosting) { scores.llama2 += 2; scores.llama3 += 2; scores.mistral += 2; scores.mixtral += 1; scores.bedrock_claude += 1; }
                if (needsSpeed) { scores.groq += 3; scores.mistral += 2; scores.phi += 2; }

                const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
                return sorted[0][0];
            }

            getRankedModels() {
                const taskLower = this.answers.taskDescription.toLowerCase();
                const isConfidential = this.answers.confidential === 'yes';
                let ranked = [];

                Object.entries(this.models).forEach(([key, m]) => {
                    let score = 0;
                    const complexity = this.answers.complexity;

                    // Base scoring on complexity
                    if (complexity === 'critical' && (key.includes('opus') || key.includes('pro') || key === 'gpt4o')) score += 3;
                    if (complexity === 'complex' && (key.includes('opus') || key.includes('pro') || key === 'gpt4o')) score += 2;
                    if (complexity === 'medium' && (key.includes('sonnet') || key.includes('turbo'))) score += 2;
                    if (complexity === 'simple' && (key.includes('haiku') || key.includes('mini') || key.includes('free'))) score += 2;

                    // Confidentiality penalty for questionable models
                    if (isConfidential) {
                        if (m.trust === 'low') score -= 10;
                        if (m.trust === 'medium') score -= 3;
                        if (m.tier === 'free' && m.trust !== 'high') score -= 5;
                    }

                    // Task-specific boosting
                    if (taskLower.includes('vision') || taskLower.includes('image')) {
                        if (key === 'gpt4o' || key === 'gpt4o_mini' || key.includes('gemini')) score += 2;
                    }

                    ranked.push({ key, model: m, score });
                });

                return ranked.sort((a, b) => b.score - a.score);
            }

            extractContextFromTask(taskDescription) {
                const lower = taskDescription.toLowerCase();
                const context = {
                    technologies: [],
                    requirements: [],
                    constraints: [],
                    domains: [],
                    patterns: []
                };

                // Technology detection
                const techMap = {
                    'react': 'React framework', 'vue': 'Vue.js', 'angular': 'Angular',
                    'python': 'Python', 'javascript': 'JavaScript', 'typescript': 'TypeScript',
                    'java': 'Java', 'go': 'Go', 'rust': 'Rust', 'c++': 'C++',
                    'nodejs': 'Node.js', 'django': 'Django', 'fastapi': 'FastAPI',
                    'aws': 'AWS', 'gcp': 'Google Cloud', 'azure': 'Azure', 'kubernetes': 'Kubernetes',
                    'docker': 'Docker', 'terraform': 'Terraform', 'sql': 'SQL', 'nosql': 'NoSQL',
                    'postgresql': 'PostgreSQL', 'mongodb': 'MongoDB', 'redis': 'Redis',
                    'graphql': 'GraphQL', 'rest': 'REST API', 'grpc': 'gRPC'
                };

                Object.entries(techMap).forEach(([tech, label]) => {
                    if (lower.includes(tech)) context.technologies.push(label);
                });

                // Requirement detection
                const requirementKeywords = {
                    'scalable': 'Scalability required',
                    'performance': 'Performance optimization needed',
                    'secure': 'Security critical',
                    'private': 'Privacy/confidentiality required',
                    'real-time': 'Real-time processing',
                    'offline': 'Offline capability',
                    'mobile': 'Mobile compatible',
                    'responsive': 'Responsive design',
                    'accessible': 'Accessibility (a11y) required',
                    'seo': 'SEO optimization',
                    'multilingual': 'Multilingual support',
                    'high availability': 'High availability needed'
                };

                Object.entries(requirementKeywords).forEach(([keyword, requirement]) => {
                    if (lower.includes(keyword)) context.requirements.push(requirement);
                });

                // Constraint detection
                const constraintKeywords = {
                    'low latency': 'Low latency constraint',
                    'edge': 'Edge deployment',
                    'limited memory': 'Memory limited',
                    'lightweight': 'Lightweight solution',
                    'budget': 'Budget constrained',
                    'legacy': 'Legacy system integration',
                    'compliance': 'Compliance requirements'
                };

                Object.entries(constraintKeywords).forEach(([keyword, constraint]) => {
                    if (lower.includes(keyword)) context.constraints.push(constraint);
                });

                // Domain detection
                const domainKeywords = {
                    'healthcare': 'Healthcare/medical', 'fintech': 'Financial services',
                    'ecommerce': 'E-commerce', 'social': 'Social media', 'gaming': 'Gaming',
                    'analytics': 'Analytics/BI', 'ml': 'Machine Learning', 'ai': 'AI',
                    'iot': 'IoT', 'blockchain': 'Blockchain', 'nlp': 'Natural Language Processing',
                    'computer vision': 'Computer Vision', 'cv': 'Computer Vision'
                };

                Object.entries(domainKeywords).forEach(([keyword, domain]) => {
                    if (lower.includes(keyword)) context.domains.push(domain);
                });

                // Pattern/architecture detection
                const patternKeywords = {
                    'microservices': 'Microservices architecture',
                    'monolith': 'Monolithic architecture',
                    'event-driven': 'Event-driven architecture',
                    'cqrs': 'CQRS pattern',
                    'saga': 'Saga pattern',
                    'circuit breaker': 'Circuit breaker pattern',
                    'stream': 'Streaming architecture',
                    'batch': 'Batch processing'
                };

                Object.entries(patternKeywords).forEach(([keyword, pattern]) => {
                    if (lower.includes(keyword)) context.patterns.push(pattern);
                });

                return context;
            }

            generatePrompt() {
                const recommended = this.scoreModel();
                if (!recommended) return '';
                
                const taskDescription = this.answers.taskDescription;
                const taskLower = taskDescription.toLowerCase();
                const context = this.extractContextFromTask(taskDescription);
                
                let guidance = [];
                let contextualTips = [];

                // Core approach based on complexity
                if (this.answers.complexity === 'critical' || this.answers.complexity === 'complex') {
                    guidance.push('Think step-by-step through each component');
                    guidance.push('Break down complex parts into smaller, manageable pieces');
                }

                // Technology-specific guidance
                if (context.technologies.length > 0) {
                    if (context.technologies.some(t => t.includes('React') || t.includes('Vue') || t.includes('Angular'))) {
                        guidance.push('Provide clear, well-commented code examples');
                        guidance.push('Explain component structure and data flow');
                    }
                    if (context.technologies.some(t => t.includes('TypeScript'))) {
                        contextualTips.push('Include proper TypeScript types and interfaces');
                        contextualTips.push('Explain generic types and advanced type patterns');
                    }
                    if (context.technologies.some(t => t.includes('Kubernetes') || t.includes('Docker'))) {
                        contextualTips.push('Consider containerization best practices');
                        contextualTips.push('Include resource allocation and scaling strategies');
                    }
                }

                // Requirement-specific guidance
                if (context.requirements.some(r => r.includes('Scalability'))) {
                    contextualTips.push('Design for horizontal and vertical scaling');
                    contextualTips.push('Consider load balancing and caching strategies');
                }
                if (context.requirements.some(r => r.includes('Performance'))) {
                    contextualTips.push('Optimize for speed and throughput');
                    contextualTips.push('Include performance benchmarks and profiling considerations');
                }
                if (context.requirements.some(r => r.includes('Security'))) {
                    contextualTips.push('Implement security best practices');
                    contextualTips.push('Cover authentication, authorization, and data protection');
                }
                if (context.requirements.some(r => r.includes('Real-time'))) {
                    contextualTips.push('Design for low-latency processing');
                    contextualTips.push('Consider WebSockets, SSE, or message queues');
                }
                if (context.requirements.some(r => r.includes('Multilingual'))) {
                    contextualTips.push('Plan for internationalization (i18n) and localization (l10n)');
                    contextualTips.push('Consider language-specific formatting and character encoding');
                }

                // Constraint-specific guidance
                if (context.constraints.some(c => c.includes('Edge'))) {
                    contextualTips.push('Optimize for edge deployment (minimal dependencies)');
                    contextualTips.push('Test on actual target hardware/edge devices');
                }
                if (context.constraints.some(c => c.includes('Memory'))) {
                    contextualTips.push('Minimize memory footprint');
                    contextualTips.push('Profile and optimize resource usage');
                }
                if (context.constraints.some(c => c.includes('Legacy'))) {
                    contextualTips.push('Ensure backward compatibility');
                    contextualTips.push('Document integration points with legacy systems');
                }

                // Domain-specific guidance
                if (context.domains.some(d => d.includes('Healthcare'))) {
                    contextualTips.push('Follow HIPAA and medical data protection standards');
                    contextualTips.push('Include audit logging and compliance tracking');
                }
                if (context.domains.some(d => d.includes('Financial'))) {
                    contextualTips.push('Implement robust error handling and transaction management');
                    contextualTips.push('Include audit trails and compliance documentation');
                }
                if (context.domains.some(d => d.includes('Machine Learning') || d.includes('AI'))) {
                    contextualTips.push('Include model training/inference considerations');
                    contextualTips.push('Document data preprocessing and feature engineering');
                }

                // Pattern-specific guidance
                if (context.patterns.some(p => p.includes('Microservices'))) {
                    contextualTips.push('Plan for service discovery and inter-service communication');
                    contextualTips.push('Design distributed transaction handling');
                }
                if (context.patterns.some(p => p.includes('Event-driven'))) {
                    contextualTips.push('Design event schema and message contracts');
                    contextualTips.push('Consider event ordering and idempotency');
                }

                // Accuracy-specific guidance
                if (this.answers.accuracy === 'mission-critical') {
                    guidance.push('Double-check facts and reasoning');
                    guidance.push('Flag any uncertainties or assumptions');
                } else if (this.answers.accuracy === 'reliable') {
                    guidance.push('Ensure accuracy while being practical');
                }

                // Speed-specific guidance
                if (this.answers.speed === 'instant') {
                    guidance.push('Keep responses concise and direct');
                } else if (this.answers.speed === 'thorough') {
                    guidance.push('Prioritize depth and completeness');
                }

                let prompt = `# Task: ${taskDescription}

## How to approach this
${guidance.length > 0 ? guidance.map(g => `- ${g}`).join('\n') : '- Provide a clear, helpful response'}`;

                if (contextualTips.length > 0) {
                    prompt += `\n\n## Context-specific guidance\n${contextualTips.map(tip => `- ${tip}`).join('\n')}`;
                }

                return prompt;
            }

            copyPrompt() {
                const prompt = this.generatePrompt();
                
                // Try modern clipboard API first
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(prompt).then(() => {
                        this.copied = true;
                        this.render();
                        setTimeout(() => { this.copied = false; this.render(); }, 2000);
                    }).catch(() => {
                        // Fallback if clipboard fails
                        this.fallbackCopy(prompt);
                    });
                } else {
                    // Fallback for older browsers
                    this.fallbackCopy(prompt);
                }
            }

            fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    this.copied = true;
                    this.render();
                    setTimeout(() => { this.copied = false; this.render(); }, 2000);
                } catch (err) {
                    console.error('Copy failed:', err);
                }
                document.body.removeChild(textarea);
            }

            reset() {
                this.step = 'task';
                this.answers = { taskDescription: '', complexity: null, speed: null, context: null, volume: null, accuracy: null, confidential: null };
                this.complexityHelperStep = 0;
                this.helperAnswers = { couldDoManually: null, wouldSonnetWork: null, researchNeeded: null, complexReasoning: null };
                this.render();
            }

            render() {
                const app = document.getElementById('app');
                if (this.step === 'task') app.innerHTML = this.renderTaskStep();
                else if (this.step === 'details') app.innerHTML = this.renderDetailsStep();
                else if (this.step === 'result') app.innerHTML = this.renderResult();
                this.attachEvents();
            }

            renderTaskStep() {
                return `
                <div class="space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <label class="block text-sm font-semibold text-slate-900 mb-2">What do you want to do?</label>
                        <textarea id="taskInput" class="w-full h-24 p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 placeholder-slate-400" placeholder="E.g., 'Write a blog post', 'Debug TypeScript', 'Analyze an image', 'Build a React component'">${this.answers.taskDescription}</textarea>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <label class="block text-sm font-semibold text-slate-900 mb-3">How complex is this task?</label>
                        <div class="grid grid-cols-4 gap-2 mb-4">
                            ${['simple', 'medium', 'complex', 'critical'].map(level => `<button class="complexity-btn p-3 rounded-lg border-2 transition-all text-sm font-medium" data-value="${level}" style="border-color: ${this.answers.complexity === level ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.complexity === level ? '#eff6ff' : '#ffffff'}; color: ${this.answers.complexity === level ? '#1e3a8a' : '#374151'};">${level.charAt(0).toUpperCase() + level.slice(1)}</button>`).join('')}
                        </div>
                        <button id="helperToggle" class="text-xs bg-blue-100 text-blue-700 px-3 py-1.5 rounded-full font-semibold hover:bg-blue-200 transition-all">${this.complexityHelperStep === -1 ? '✓ Close helper' : '❓ Not sure? Get help'}</button>
                        ${this.complexityHelperStep === -1 ? this.renderInlineComplexityHelper() : ''}
                    </div>

                    <button id="nextBtn" class="w-full py-3 px-6 rounded-xl font-semibold text-white ${this.answers.taskDescription.trim() && this.answers.complexity ? 'bg-gradient-to-r from-blue-500 to-cyan-500 hover:shadow-lg cursor-pointer' : 'bg-slate-300 cursor-not-allowed'}" ${!(this.answers.taskDescription.trim() && this.answers.complexity) ? 'disabled' : ''}>
                        Continue →
                    </button>
                </div>
                `;
            }

            renderInlineComplexityHelper() {
                const questions = [
                    { id: 'couldDoManually', q: 'Could you reasonably do this yourself?' },
                    { id: 'wouldSonnetWork', q: 'Would a free AI model be fine?' },
                    { id: 'researchNeeded', q: 'Does this need deep research?' },
                    { id: 'complexReasoning', q: 'Does this need multi-step reasoning?' },
                ];
                
                let html = '<div class="mt-4 p-4 bg-blue-50 rounded-lg border border-blue-200">';
                let yesCount = 0;
                let allAnswered = true;

                for (let i = 0; i < questions.length; i++) {
                    const q = questions[i];
                    const answer = this.helperAnswers[q.id];
                    if (answer === true) yesCount++;
                    if (answer === null) allAnswered = false;

                    html += `
                    <div class="flex items-center gap-3 mb-2 last:mb-0">
                        <span class="text-xs text-slate-600 flex-1">${q.q}</span>
                        <button class="helper-no px-2 py-1 text-xs rounded border border-slate-300 ${answer === false ? 'bg-red-100 text-red-700 border-red-300' : 'bg-white text-slate-600 hover:bg-slate-50'}" data-question="${q.id}">No</button>
                        <button class="helper-yes px-2 py-1 text-xs rounded ${answer === true ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-white text-slate-600 border border-slate-300 hover:bg-slate-50'}" data-question="${q.id}">Yes</button>
                    </div>
                    `;
                }

                if (allAnswered) {
                    let result = 'Simple';
                    if (yesCount >= 3) result = 'Complex';
                    else if (yesCount >= 1) result = 'Medium';
                    html += `<div class="mt-3 p-2 bg-white rounded border border-blue-300 text-center"><p class="text-xs font-semibold text-blue-900">Suggested: <strong>${result}</strong></p></div>`;
                }

                html += '</div>';
                return html;
            }

            renderDetailsStep() {
                const relevantQuestions = this.getRelevantQuestions();
                const allAnswered = relevantQuestions.every(q => this.answers[q] !== null) && this.answers.confidential !== null;

                let html = '<div class="space-y-4">';

                for (const q of relevantQuestions) {
                    if (q === 'speed') {
                        html += `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                            <label class="block text-xs font-semibold text-slate-900 mb-2">How fast do you need it?</label>
                            <div class="grid grid-cols-3 gap-2">
                                ${[{id: 'instant', label: 'Instant'}, {id: 'fast', label: 'Fast'}, {id: 'thorough', label: 'Thorough'}].map(opt => `<button class="speed-btn p-2 rounded-lg border-2 transition-all text-xs font-medium" data-value="${opt.id}" style="border-color: ${this.answers.speed === opt.id ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.speed === opt.id ? '#eff6ff' : '#ffffff'};">${opt.label}</button>`).join('')}
                            </div>
                        </div>
                        `;
                    }
                    if (q === 'context') {
                        html += `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                            <label class="block text-xs font-semibold text-slate-900 mb-2">How much context?</label>
                            <div class="grid grid-cols-2 gap-2">
                                ${[{id: 'small', label: 'Small'}, {id: 'medium', label: 'Medium'}, {id: 'large', label: 'Large'}, {id: 'massive', label: 'Massive'}].map(opt => `<button class="context-btn p-2 rounded-lg border-2 transition-all text-xs font-medium" data-value="${opt.id}" style="border-color: ${this.answers.context === opt.id ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.context === opt.id ? '#eff6ff' : '#ffffff'};">${opt.label}</button>`).join('')}
                            </div>
                        </div>
                        `;
                    }
                    if (q === 'volume') {
                        html += `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                            <label class="block text-xs font-semibold text-slate-900 mb-2">How often will you do this?</label>
                            <div class="grid grid-cols-3 gap-2">
                                ${[{id: 'high', label: 'Often'}, {id: 'medium', label: 'Sometimes'}, {id: 'low', label: 'Rarely'}].map(opt => `<button class="volume-btn p-2 rounded-lg border-2 transition-all text-xs font-medium" data-value="${opt.id}" style="border-color: ${this.answers.volume === opt.id ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.volume === opt.id ? '#eff6ff' : '#ffffff'};">${opt.label}</button>`).join('')}
                            </div>
                        </div>
                        `;
                    }
                    if (q === 'accuracy') {
                        html += `
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                            <label class="block text-xs font-semibold text-slate-900 mb-2">How important is accuracy?</label>
                            <div class="grid grid-cols-3 gap-2">
                                ${[{id: 'good-enough', label: 'Good enough'}, {id: 'reliable', label: 'Reliable'}, {id: 'mission-critical', label: 'Critical'}].map(opt => `<button class="accuracy-btn p-2 rounded-lg border-2 transition-all text-xs font-medium" data-value="${opt.id}" style="border-color: ${this.answers.accuracy === opt.id ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.accuracy === opt.id ? '#eff6ff' : '#ffffff'};">${opt.label}</button>`).join('')}
                            </div>
                        </div>
                        `;
                    }
                }

                html += `
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4">
                        <label class="block text-xs font-semibold text-slate-900 mb-2">Is confidential data involved?</label>
                        <div class="grid grid-cols-2 gap-2">
                            ${[{id: 'yes', label: 'Yes, confidential'}, {id: 'no', label: 'No, public'}].map(opt => `<button class="confidential-btn p-2 rounded-lg border-2 transition-all text-xs font-medium" data-value="${opt.id}" style="border-color: ${this.answers.confidential === opt.id ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.confidential === opt.id ? '#eff6ff' : '#ffffff'};">${opt.label}</button>`).join('')}
                        </div>
                    </div>

                    <div class="flex gap-3">
                        <button id="backBtn" class="flex-1 py-2 px-4 rounded-lg border-2 border-slate-300 text-slate-900 font-semibold hover:bg-slate-50 text-sm">← Back</button>
                        <button id="recommendBtn" class="flex-1 py-2 px-4 rounded-lg ${allAnswered ? 'bg-gradient-to-r from-blue-500 to-cyan-500 text-white cursor-pointer hover:shadow-lg' : 'bg-slate-300 text-slate-500 cursor-not-allowed'} font-semibold text-sm" ${!allAnswered ? 'disabled' : ''}>Get Recommendation</button>
                    </div>
                </div>
                `;
                return html;
            }

            renderResult() {
                const recommended = this.scoreModel();
                if (!recommended) return '';
                const model = this.models[recommended];
                const prompt = this.generatePrompt();
                const isConfidential = this.answers.confidential === 'yes';
                const ranked = this.getRankedModels();

                let html = '<div class="space-y-4">';

                // Show confidentiality warning if needed
                if (isConfidential) {
                    html += `
                    <div class="bg-red-50 border border-red-300 rounded-xl p-4">
                        <p class="text-xs font-semibold text-red-900 mb-1">⚠️ CONFIDENTIALITY ALERT</p>
                        <p class="text-xs text-red-800">This task involves confidential data. Free models and some providers may use your data for training. Choose carefully.</p>
                    </div>
                    `;
                }

                // Top recommendation card
                html += `
                <div class="bg-gradient-to-br ${model.color} rounded-xl shadow-lg p-6 text-white">
                    <p class="text-xs font-semibold opacity-90 mb-1">🏆 TOP RECOMMENDATION</p>
                    <h2 class="text-3xl font-bold mb-2">${model.name}</h2>
                    <p class="text-sm opacity-90">${model.description}</p>
                </div>
                `;

                // Free alternative if the top recommendation is paid
                if (model.tier === 'paid') {
                    const freeModels = ranked.filter(item => this.models[item.key].tier === 'free').slice(0, 1);
                    if (freeModels.length > 0) {
                        const freeModel = this.models[freeModels[0].key];
                        html += `
                        <div class="bg-gradient-to-br ${freeModel.color} rounded-xl shadow-lg p-6 text-white">
                            <p class="text-xs font-semibold opacity-90 mb-1">💰 FREE ALTERNATIVE</p>
                            <h2 class="text-2xl font-bold mb-2">${freeModel.name}</h2>
                            <p class="text-sm opacity-90">${freeModel.description}</p>
                        </div>
                        `;
                    }
                }

                // Specs and pricing
                html += `
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white rounded-lg p-3 border border-slate-200">
                        <p class="text-xs text-slate-600 font-semibold mb-1">BEST FOR</p>
                        <ul class="space-y-1">
                            ${model.bestFor.slice(0, 2).map(item => `<li class="text-xs text-slate-900">• ${item}</li>`).join('')}
                        </ul>
                    </div>
                    <div class="bg-white rounded-lg p-3 border border-slate-200">
                        <p class="text-xs text-slate-600 font-semibold mb-1">SPECS</p>
                        <div class="space-y-1 text-xs text-slate-900">
                            <p><strong>Speed:</strong> ${model.speed}</p>
                            <p><strong>Accuracy:</strong> ${model.accuracy}</p>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-50 rounded-lg p-3 border border-slate-200">
                    <p class="text-xs text-slate-600 font-semibold mb-1">PRICING</p>
                    <p class="text-xs text-slate-900">${model.costs}</p>
                </div>
                `;

                // Task approach
                html += `
                <div class="bg-white rounded-xl border border-slate-200 p-4">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-sm font-semibold text-slate-900">Your Task Approach</h3>
                        <button id="copyBtn" class="p-2 rounded-lg text-xs ${this.copied ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}">
                            ${this.copied ? '✓ Copied' : '📋 Copy'}
                        </button>
                    </div>
                    <pre class="bg-slate-50 p-3 rounded-lg text-xs text-slate-800 overflow-x-auto border border-slate-200 whitespace-pre-wrap break-words max-h-60">${prompt}</pre>
                </div>
                `;

                // All rankings
                html += `
                <div class="bg-white rounded-xl border border-slate-200 p-4">
                    <p class="text-sm font-semibold text-slate-900 mb-3">📊 ALL MODELS RANKED FOR YOUR TASK</p>
                    <div class="space-y-3">
                `;

                ranked.forEach((item, idx) => {
                    const m = item.model;
                    const isBest = idx === 0;
                    const confidentialWarning = isConfidential && m.trust !== 'high' ? '⚠️ ' : '';
                    
                    html += `
                    <div class="border ${isBest ? 'border-blue-300 bg-blue-50' : 'border-slate-200 bg-white'} rounded-lg p-3">
                        <div class="flex items-start justify-between mb-2">
                            <div class="flex-1">
                                <p class="text-sm font-bold text-slate-900">#${idx + 1} ${confidentialWarning}${m.name}</p>
                                <p class="text-xs text-slate-600">${m.costs}</p>
                            </div>
                            <span class="text-xs font-semibold ${isBest ? 'bg-blue-200 text-blue-900' : 'bg-slate-200 text-slate-900'} px-2 py-1 rounded">Score: ${item.score}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-xs">
                            <div>
                                <p class="font-semibold text-green-900 mb-1">✓ Why it's good:</p>
                                <ul class="space-y-0.5">
                                    ${m.pros.map(pro => `<li class="text-green-800">• ${pro}</li>`).join('')}
                                </ul>
                            </div>
                            <div>
                                <p class="font-semibold text-red-900 mb-1">✗ Why it's not ideal:</p>
                                <ul class="space-y-0.5">
                                    ${m.cons.map(con => `<li class="text-red-800">• ${con}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                    `;
                });

                html += `
                    </div>
                </div>

                <button id="resetBtn" class="w-full py-2 px-4 rounded-lg font-semibold text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 text-sm">↻ Start Over</button>
                </div>
                `;
                return html;
            }

            attachEvents() {
                document.getElementById('taskInput')?.addEventListener('input', (e) => { this.answers.taskDescription = e.target.value; });
                document.querySelectorAll('.complexity-btn').forEach(btn => { 
                    btn.addEventListener('click', () => { 
                        this.answers.complexity = btn.dataset.value;
                        // Auto-close helper when selecting a complexity level
                        if (this.complexityHelperStep === -1) {
                            this.complexityHelperStep = 0;
                            this.helperAnswers = { couldDoManually: null, wouldSonnetWork: null, researchNeeded: null, complexReasoning: null };
                        }
                        this.render(); 
                    }); 
                });
                document.getElementById('helperToggle')?.addEventListener('click', () => { 
                    this.complexityHelperStep = this.complexityHelperStep === -1 ? 0 : -1;
                    if (this.complexityHelperStep === 0) {
                        this.helperAnswers = { couldDoManually: null, wouldSonnetWork: null, researchNeeded: null, complexReasoning: null };
                    }
                    this.render(); 
                });
                document.querySelectorAll('.helper-yes, .helper-no').forEach(btn => { 
                    btn.addEventListener('click', () => { 
                        const question = btn.dataset.question;
                        this.helperAnswers[question] = btn.classList.contains('helper-yes');
                        // Auto-suggest complexity based on yes count
                        const yesCount = Object.values(this.helperAnswers).filter(v => v === true).length;
                        if (yesCount >= 3) this.answers.complexity = 'complex';
                        else if (yesCount >= 1) this.answers.complexity = 'medium';
                        else this.answers.complexity = 'simple';
                        this.render(); 
                    }); 
                });
                document.getElementById('nextBtn')?.addEventListener('click', () => { this.step = 'details'; this.render(); });
                document.getElementById('backBtn')?.addEventListener('click', () => { this.step = 'task'; this.render(); });
                document.querySelectorAll('.speed-btn, .context-btn, .volume-btn, .accuracy-btn, .confidential-btn').forEach(btn => { btn.addEventListener('click', () => { const cls = btn.className; if (cls.includes('speed-btn')) this.answers.speed = btn.dataset.value; if (cls.includes('context-btn')) this.answers.context = btn.dataset.value; if (cls.includes('volume-btn')) this.answers.volume = btn.dataset.value; if (cls.includes('accuracy-btn')) this.answers.accuracy = btn.dataset.value; if (cls.includes('confidential-btn')) this.answers.confidential = btn.dataset.value; this.render(); }); });
                document.getElementById('recommendBtn')?.addEventListener('click', () => { this.step = 'result'; this.render(); });
                document.getElementById('copyBtn')?.addEventListener('click', () => { this.copyPrompt(); });
                document.getElementById('resetBtn')?.addEventListener('click', () => { this.reset(); });
            }
        }

        new AIModelAdvisor();
    </script>
</body>
</html>
