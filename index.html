<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Choose the right AI model for your task - Claude, ChatGPT, Gemini, and more">
    <title>AI Model Advisor - Find Your Perfect Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-slate-100">
    <div class="min-h-screen p-6 md:p-12">
        <div class="max-w-2xl mx-auto">
            <div class="mb-8">
                <h1 class="text-4xl md:text-5xl font-bold text-slate-900 mb-2">AI Model Advisor</h1>
                <p class="text-lg text-slate-600">Compare Claude, ChatGPT, Gemini, and more. Get personalized recommendations and optimized prompts.</p>
            </div>
            <div id="app"></div>
        </div>
    </div>

    <script>
        class ClaudeAdvisor {
            constructor() {
                this.step = 'questions';
                this.answers = {
                    taskDescription: '',
                    complexity: null,
                    speed: null,
                    budget: null,
                    context: null,
                    volume: null,
                    accuracy: null,
                };
                this.copied = false;
                this.complexityHelperStep = 0;
                this.helperAnswers = {
                    couldDoManually: null,
                    wouldSonnetWork: null,
                    researchNeeded: null,
                    complexReasoning: null,
                };

                this.models = {
                    haiku_free: {
                        name: 'Claude Haiku 4.5 (Free)',
                        description: 'Free tier - fast and lightweight',
                        color: 'from-yellow-300 to-amber-400',
                        provider: 'Anthropic',
                        bestFor: ['Quick tasks', 'Learning', 'Experimentation', 'Light use'],
                        costs: 'Free',
                        speed: 'Fastest (50+ tok/s)',
                        accuracy: '73.3%',
                        context: '200K tokens',
                        use: 'When you want to try things out for free',
                    },
                    haiku: {
                        name: 'Claude Haiku 4.5',
                        description: 'Lightning-fast and affordable',
                        color: 'from-amber-400 to-orange-500',
                        provider: 'Anthropic',
                        bestFor: ['Quick summaries', 'Simple tasks', 'Data extraction', 'Classification'],
                        costs: '$0.80 input / $4 output per 1M tokens',
                        speed: 'Fastest (50+ tok/s)',
                        accuracy: '73.3% (SWE-bench)',
                        context: '200K tokens',
                        use: 'When speed and cost matter more than depth',
                    },
                    sonnet: {
                        name: 'Claude Sonnet 4.6',
                        description: 'The reliable workhorse',
                        color: 'from-blue-400 to-cyan-500',
                        provider: 'Anthropic',
                        bestFor: ['Feature development', 'Content creation', 'Code review', 'Analysis'],
                        costs: '$3 input / $15 output per 1M tokens',
                        speed: 'Fast (20+ tok/s)',
                        accuracy: '~80% (SWE-bench)',
                        context: '200K or 1M tokens',
                        use: 'Your default for most work—best value',
                    },
                    opus: {
                        name: 'Claude Opus 4.6',
                        description: 'Deep thinking for complex problems',
                        color: 'from-purple-400 to-pink-500',
                        provider: 'Anthropic',
                        bestFor: ['Architecture decisions', 'Critical reviews', 'Multi-step reasoning', 'Large codebase analysis'],
                        costs: '$5 input / $25 output per 1M tokens',
                        speed: 'Slower (10+ tok/s)',
                        accuracy: '80.9% (SWE-bench)',
                        context: '1M tokens (extended)',
                        use: 'Reserve for truly complex, high-stakes work',
                    },
                    gpt4o_mini: {
                        name: 'GPT-4o mini (Free)',
                        description: 'Free lightweight model from OpenAI',
                        color: 'from-emerald-300 to-green-400',
                        provider: 'OpenAI',
                        bestFor: ['Quick tasks', 'Learning', 'Simple reasoning', 'Free experimentation'],
                        costs: 'Free (limited)',
                        speed: 'Very fast (30+ tok/s)',
                        accuracy: '~75%',
                        context: '128K tokens',
                        use: 'Free tier with decent capability',
                    },
                    gpt4o: {
                        name: 'GPT-4o',
                        description: 'Advanced reasoning with vision capabilities',
                        color: 'from-green-400 to-emerald-500',
                        provider: 'OpenAI',
                        bestFor: ['Vision/image analysis', 'Complex reasoning', 'Multimodal tasks', 'Creative writing'],
                        costs: '$5 input / $15 output per 1M tokens',
                        speed: 'Moderate (15+ tok/s)',
                        accuracy: '~82% (Reasoning)',
                        context: '128K tokens',
                        use: 'For multimodal tasks and vision work',
                    },
                    gpt4turbo: {
                        name: 'GPT-4 Turbo',
                        description: 'Cost-effective reasoning',
                        color: 'from-green-500 to-teal-600',
                        provider: 'OpenAI',
                        bestFor: ['Cost-conscious work', 'Coding', 'Analysis', 'General tasks'],
                        costs: '$3 input / $15 output per 1M tokens',
                        speed: 'Moderate (15+ tok/s)',
                        accuracy: '~80%',
                        context: '128K tokens',
                        use: 'Budget-friendly reasoning alternative',
                    },
                    gemini_free: {
                        name: 'Gemini (Free)',
                        description: 'Google\'s free multimodal model',
                        color: 'from-cyan-300 to-blue-400',
                        provider: 'Google',
                        bestFor: ['Free multimodal tasks', 'Quick analysis', 'Learning', 'Experimentation'],
                        costs: 'Free',
                        speed: 'Very fast (40+ tok/s)',
                        accuracy: '~75%',
                        context: '1M tokens',
                        use: 'Free tier with excellent value',
                    },
                    gemini: {
                        name: 'Gemini Pro 2.0',
                        description: 'Fast multimodal with long context',
                        color: 'from-blue-500 to-purple-600',
                        provider: 'Google',
                        bestFor: ['Quick analysis', 'Multimodal tasks', 'Long documents', 'Budget work'],
                        costs: '$0.075 input / $0.30 output per 1M tokens',
                        speed: 'Very fast (40+ tok/s)',
                        accuracy: '~78%',
                        context: '1M tokens',
                        use: 'Best value for long-context and multimodal',
                    },
                };

                this.render();
            }

            scoreModel() {
                if (!this.answers.taskDescription.trim()) return null;
                let scores = { haiku: 0, sonnet: 0, opus: 0, gpt4o: 0, gpt4turbo: 0, gemini: 0 };
                let finalComplexity = this.answers.complexity;
                if (this.complexityHelperStep > 0) {
                    const helperScore = Object.values(this.helperAnswers).filter(v => v === true).length;
                    if (helperScore >= 3) finalComplexity = 'complex';
                    else if (helperScore >= 2) finalComplexity = 'medium';
                    else finalComplexity = 'simple';
                }
                if (finalComplexity === 'simple') { scores.haiku += 3; scores.gemini += 2; }
                if (finalComplexity === 'medium') { scores.sonnet += 3; scores.gpt4turbo += 2; }
                if (finalComplexity === 'complex') { scores.opus += 3; scores.gpt4o += 2; }
                if (finalComplexity === 'critical') { scores.opus += 4; scores.gpt4o += 2; }
                if (this.answers.speed === 'instant') { scores.haiku += 2; scores.gemini += 3; }
                if (this.answers.speed === 'fast') { scores.sonnet += 2; scores.gpt4turbo += 1; }
                if (this.answers.speed === 'thorough') { scores.opus += 1; scores.gpt4o += 1; }
                if (this.answers.budget === 'very') { scores.haiku += 2; scores.gemini += 3; }
                if (this.answers.budget === 'somewhat') { scores.sonnet += 2; scores.gpt4turbo += 2; }
                if (this.answers.budget === 'flexible') { scores.opus += 1; scores.gpt4o += 1; }
                if (this.answers.context === 'small') { scores.haiku += 1; scores.gpt4turbo += 1; }
                if (this.answers.context === 'medium') { scores.sonnet += 1; scores.gpt4o += 1; }
                if (this.answers.context === 'large') { scores.sonnet += 2; scores.gpt4o += 1; }
                if (this.answers.context === 'massive') { scores.opus += 3; scores.gemini += 3; }
                if (this.answers.volume === 'high') { scores.haiku += 1; scores.gemini += 2; }
                if (this.answers.volume === 'medium') { scores.sonnet += 1; scores.gpt4turbo += 1; }
                if (this.answers.volume === 'low') { scores.opus += 1; scores.gpt4o += 1; }
                if (this.answers.accuracy === 'good-enough') { scores.haiku += 1; scores.gemini += 1; }
                if (this.answers.accuracy === 'reliable') { scores.sonnet += 1; scores.gpt4turbo += 1; }
                if (this.answers.accuracy === 'mission-critical') { scores.opus += 3; scores.gpt4o += 2; }
                const taskLower = this.answers.taskDescription.toLowerCase();
                if (taskLower.includes('vision') || taskLower.includes('image') || taskLower.includes('photo')) {
                    scores.gpt4o += 3;
                    scores.gemini += 2;
                }
                const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
                return sorted[0][0];
            }

            generatePrompt() {
                const recommended = this.scoreModel();
                if (!recommended) return '';
                const taskLower = this.answers.taskDescription.toLowerCase();
                let modelInstructions = [];
                if (this.answers.complexity === 'complex' || this.answers.complexity === 'critical') {
                    modelInstructions.push('- Think step-by-step through this problem');
                    modelInstructions.push('- Break down complex parts into smaller pieces');
                    if (recommended === 'opus') {
                        modelInstructions.push('- Use extended thinking for particularly complex sections');
                    }
                }
                if (this.answers.accuracy === 'mission-critical') {
                    modelInstructions.push('- Double-check facts and reasoning');
                    modelInstructions.push('- Explain your confidence level for key claims');
                    modelInstructions.push('- Flag any uncertainties or assumptions');
                } else if (this.answers.accuracy === 'reliable') {
                    modelInstructions.push('- Aim for accuracy while being practical');
                    modelInstructions.push('- Cite sources where relevant');
                }
                if (this.answers.speed === 'thorough') {
                    modelInstructions.push('- Prioritize depth and completeness over brevity');
                    modelInstructions.push('- Include detailed explanations and reasoning');
                } else if (this.answers.speed === 'instant') {
                    modelInstructions.push('- Focus on quick, direct answers');
                    modelInstructions.push('- Skip unnecessary details');
                }
                if (this.answers.context === 'massive') {
                    modelInstructions.push('- Use all the context provided to inform your response');
                    modelInstructions.push('- Look for patterns and connections across the material');
                }
                if (this.answers.volume === 'high') {
                    modelInstructions.push('- Optimize for clarity and reusability');
                    modelInstructions.push('- Include patterns that work at scale');
                }
                if (taskLower.includes('blog') || taskLower.includes('write') || taskLower.includes('article')) {
                    modelInstructions.push('- Write for clarity and engagement');
                    modelInstructions.push('- Use concrete examples to illustrate points');
                    modelInstructions.push('- Organize with a clear narrative flow');
                } else if (taskLower.includes('code') || taskLower.includes('debug')) {
                    modelInstructions.push('- Provide production-ready code');
                    modelInstructions.push('- Include inline comments for non-obvious logic');
                    if (recommended !== 'haiku') {
                        modelInstructions.push('- Explain the reasoning behind your approach');
                    }
                }
                let outputInstructions = [];
                if (taskLower.includes('blog') || taskLower.includes('write') || taskLower.includes('article')) {
                    outputInstructions.push('- Use clear headings and subheadings');
                    outputInstructions.push('- Keep paragraphs focused (2-3 sentences max)');
                    outputInstructions.push('- Include intro, body, and conclusion');
                } else if (taskLower.includes('code') || taskLower.includes('debug')) {
                    outputInstructions.push('- Code in clearly labeled blocks');
                    outputInstructions.push('- Include explanatory text between code sections');
                } else {
                    outputInstructions.push('- Structure with clear sections');
                    outputInstructions.push('- Use formatting (bold, bullets) for readability');
                }
                return `# Task: ${this.answers.taskDescription}\n\n## How to approach this\n${modelInstructions.join('\n')}\n\n## Format for your response\n${outputInstructions.join('\n')}`;
            }

            copyPrompt() {
                const prompt = this.generatePrompt();
                navigator.clipboard.writeText(prompt).then(() => {
                    this.copied = true;
                    this.render();
                    setTimeout(() => {
                        this.copied = false;
                        this.render();
                    }, 2000);
                }).catch(() => {
                    const ta = document.createElement("textarea");
                    ta.value = prompt;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                    this.copied = true;
                    this.render();
                    setTimeout(() => {
                        this.copied = false;
                        this.render();
                    }, 2000);
                });
            }

            reset() {
                this.step = 'questions';
                this.complexityHelperStep = 0;
                this.answers = {
                    taskDescription: '',
                    complexity: null,
                    speed: null,
                    budget: null,
                    context: null,
                    volume: null,
                    accuracy: null,
                };
                this.helperAnswers = { couldDoManually: null, wouldSonnetWork: null, researchNeeded: null, complexReasoning: null };
                this.render();
            }

            render() {
                const app = document.getElementById('app');
                if (this.step === 'questions') {
                    app.innerHTML = this.renderQuestions();
                } else if (this.step === 'complexity-helper') {
                    app.innerHTML = this.renderComplexityHelper();
                } else if (this.step === 'result') {
                    app.innerHTML = this.renderResult();
                }
                this.attachEvents();
            }

            renderQuestions() {
                const allAnswered = this.answers.taskDescription.trim() && this.answers.speed && this.answers.context && this.answers.volume && this.answers.accuracy && (this.answers.complexity || this.complexityHelperStep > 0);
                return `
                <div class="space-y-6">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <label class="block text-sm font-semibold text-slate-900 mb-2">What do you want to do?</label>
                        <textarea id="taskInput" class="w-full h-20 p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-900 placeholder-slate-400" placeholder="E.g., 'Write a blog post', 'Debug code', 'Analyze data'">${this.answers.taskDescription}</textarea>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <div class="flex items-center justify-between mb-3">
                            <label class="block text-sm font-semibold text-slate-900">How complex is this task?</label>
                            <button id="notSureBtn" class="text-xs bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-semibold hover:bg-blue-200">❓ Not sure?</button>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            ${['simple', 'medium', 'complex', 'critical'].map(level => `<button class="complexity-btn p-3 rounded-lg border-2 transition-all text-sm font-medium" data-value="${level}" style="border-color: ${this.answers.complexity === level ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.complexity === level ? '#eff6ff' : '#ffffff'}; color: ${this.answers.complexity === level ? '#1e3a8a' : '#374151'};">${level.charAt(0).toUpperCase() + level.slice(1)}</button>`).join('')}
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <label class="block text-sm font-semibold text-slate-900 mb-3">How fast do you need an answer?</label>
                        <div class="grid grid-cols-3 gap-3">
                            ${[{id: 'instant', label: 'Instant', desc: 'Now'}, {id: 'fast', label: 'Fast', desc: '< 1 min'}, {id: 'thorough', label: 'Thorough', desc: 'Take your time'}].map(opt => `<button class="speed-btn p-3 rounded-lg border-2 transition-all text-sm" data-value="${opt.id}" style="border-color: ${this.answers.speed === opt.id ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.speed === opt.id ? '#eff6ff' : '#ffffff'};"><div class="font-medium text-slate-900">${opt.label}</div><div class="text-xs text-slate-500">${opt.desc}</div></button>`).join('')}
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <label class="block text-sm font-semibold text-slate-900 mb-3">How much context?</label>
                        <div class="grid grid-cols-2 gap-3">
                            ${[{id: 'small', label: 'Small', desc: 'A few paragraphs'}, {id: 'medium', label: 'Medium', desc: 'One document'}, {id: 'large', label: 'Large', desc: 'Multiple files'}, {id: 'massive', label: 'Massive', desc: 'Entire codebase'}].map(opt => `<button class="context-btn p-3 rounded-lg border-2 transition-all text-sm" data-value="${opt.id}" style="border-color: ${this.answers.context === opt.id ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.context === opt.id ? '#eff6ff' : '#ffffff'};"><div class="font-medium text-slate-900">${opt.label}</div><div class="text-xs text-slate-500">${opt.desc}</div></button>`).join('')}
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <label class="block text-sm font-semibold text-slate-900 mb-3">How often will you do this?</label>
                        <div class="grid grid-cols-3 gap-3">
                            ${[{id: 'high', label: 'Often', desc: 'Daily'}, {id: 'medium', label: 'Sometimes', desc: 'Weekly'}, {id: 'low', label: 'Rarely', desc: 'One-off'}].map(opt => `<button class="volume-btn p-3 rounded-lg border-2 transition-all text-sm" data-value="${opt.id}" style="border-color: ${this.answers.volume === opt.id ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.volume === opt.id ? '#eff6ff' : '#ffffff'};"><div class="font-medium text-slate-900">${opt.label}</div><div class="text-xs text-slate-500">${opt.desc}</div></button>`).join('')}
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                        <label class="block text-sm font-semibold text-slate-900 mb-3">How important is accuracy?</label>
                        <div class="grid grid-cols-3 gap-3">
                            ${[{id: 'good-enough', label: 'Good enough', desc: 'For brainstorming'}, {id: 'reliable', label: 'Reliable', desc: 'Production work'}, {id: 'mission-critical', label: 'Critical', desc: 'High stakes'}].map(opt => `<button class="accuracy-btn p-3 rounded-lg border-2 transition-all text-sm" data-value="${opt.id}" style="border-color: ${this.answers.accuracy === opt.id ? '#3b82f6' : '#e2e8f0'}; background-color: ${this.answers.accuracy === opt.id ? '#eff6ff' : '#ffffff'};"><div class="font-medium text-slate-900">${opt.label}</div><div class="text-xs text-slate-500">${opt.desc}</div></button>`).join('')}
                        </div>
                    </div>
                    <button id="recommendBtn" ${!allAnswered ? 'disabled style="background-color: #d1d5db; cursor: not-allowed;"' : 'style="background: linear-gradient(to right, #3b82f6, #06b6d4); cursor: pointer;"'} class="w-full py-4 px-6 rounded-xl font-semibold text-white flex items-center justify-center gap-2 hover:shadow-lg">Get My Recommendation →</button>
                </div>
                `;
            }

            renderComplexityHelper() {
                const questions = [
                    { id: 'couldDoManually', question: 'Could you reasonably do this task yourself (but time-consuming)?', help: 'If yes, it\'s probably simpler than you think.' },
                    { id: 'wouldSonnetWork', question: 'Do you think Sonnet (the middle model) would probably work fine?', help: 'If yes, Sonnet is usually the sweet spot.' },
                    { id: 'researchNeeded', question: 'Does this task require deep research, fact-checking, or learning new information?', help: 'If yes, premium models shine.' },
                    { id: 'complexReasoning', question: 'Does this need multi-step reasoning or connecting lots of ideas together?', help: 'If yes, you might benefit from Opus.' },
                ];
                if (this.complexityHelperStep < questions.length) {
                    const q = questions[this.complexityHelperStep];
                    return `
                    <div class="space-y-6">
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-8">
                            <h3 class="text-xl font-semibold text-slate-900 mb-2">${q.question}</h3>
                            <p class="text-sm text-slate-600 mb-6 bg-slate-50 p-3 rounded-lg">💡 ${q.help}</p>
                            <div class="flex gap-4">
                                <button class="complexity-no flex-1 py-3 px-4 rounded-lg border-2 border-slate-300 text-slate-900 font-semibold hover:bg-slate-50">No</button>
                                <button class="complexity-yes flex-1 py-3 px-4 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-600">Yes</button>
                            </div>
                        </div>
                    </div>
                    `;
                } else {
                    const yesCount = Object.values(this.helperAnswers).filter(v => v === true).length;
                    let message = '';
                    if (yesCount >= 3) {
                        message = '<p class="text-slate-900 font-semibold mb-2">You probably need a premium model</p><p class="text-slate-700 text-sm">Use Opus for complex reasoning and research work.</p>';
                    } else if (yesCount >= 1) {
                        message = '<p class="text-slate-900 font-semibold mb-2">Sonnet is your sweet spot</p><p class="text-slate-700 text-sm">It has enough power without the Opus price tag.</p>';
                    } else {
                        message = '<p class="text-slate-900 font-semibold mb-2">Haiku or Sonnet will work</p><p class="text-slate-700 text-sm">Save money with the faster, cheaper option.</p>';
                    }
                    return `
                    <div class="space-y-4">
                        <div class="bg-gradient-to-br from-green-50 to-emerald-50 rounded-xl p-6 border border-green-200">
                            <h3 class="font-bold text-slate-900 mb-2">Based on your answers:</h3>
                            ${message}
                        </div>
                        <button id="backBtn" class="w-full py-3 px-4 rounded-lg bg-blue-500 text-white font-semibold hover:bg-blue-600">Back to Main Form</button>
                    </div>
                    `;
                }
            }

            renderResult() {
                const recommended = this.scoreModel();
                if (!recommended) return '';
                const model = this.models[recommended];
                const prompt = this.generatePrompt();
                return `
                <div class="space-y-6">
                    <div class="bg-gradient-to-br ${model.color} rounded-xl shadow-lg p-8 text-white">
                        <p class="text-sm font-semibold opacity-90 mb-1">RECOMMENDED FOR YOU</p>
                        <h2 class="text-4xl font-bold mb-4">${model.name}</h2>
                        <p class="text-lg opacity-90">${model.description}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white rounded-lg p-4 border border-slate-200">
                            <p class="text-xs text-slate-600 font-semibold mb-1">BEST FOR</p>
                            <ul class="space-y-1">
                                ${model.bestFor.map(item => `<li class="text-sm text-slate-900">• ${item}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="bg-white rounded-lg p-4 border border-slate-200">
                            <p class="text-xs text-slate-600 font-semibold mb-1">SPECS</p>
                            <div class="space-y-1 text-sm text-slate-900">
                                <p><strong>Speed:</strong> ${model.speed}</p>
                                <p><strong>Cost/task:</strong> ${model.costPerTask}</p>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl border border-slate-200 p-6">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-semibold text-slate-900">Your Custom Prompt</h3>
                            <button id="copyBtn" class="p-2 rounded-lg ${this.copied ? 'bg-green-100 text-green-700' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}">
                                ${this.copied ? '✓' : '📋'}
                            </button>
                        </div>
                        <pre class="bg-slate-50 p-4 rounded-lg text-xs text-slate-800 overflow-x-auto border border-slate-200 whitespace-pre-wrap break-words max-h-96">${prompt}</pre>
                        <p class="text-xs text-slate-600 mt-3">${this.copied ? '✓ Copied to clipboard!' : 'Click the copy icon to copy this prompt'}</p>
                    </div>
                    <button id="resetBtn" class="w-full py-3 px-6 rounded-xl font-semibold text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 transition-all">↻ Start Over</button>
                </div>
                `;
            }

            attachEvents() {
                document.getElementById('taskInput')?.addEventListener('input', (e) => {
                    this.answers.taskDescription = e.target.value;
                });
                document.querySelectorAll('.complexity-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.answers.complexity = btn.dataset.value;
                        this.complexityHelperStep = 0;
                        this.render();
                    });
                });
                document.querySelectorAll('.speed-btn, .budget-btn, .context-btn, .volume-btn, .accuracy-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const cls = btn.className;
                        if (cls.includes('speed-btn')) this.answers.speed = btn.dataset.value;
                        if (cls.includes('budget-btn')) this.answers.budget = btn.dataset.value;
                        if (cls.includes('context-btn')) this.answers.context = btn.dataset.value;
                        if (cls.includes('volume-btn')) this.answers.volume = btn.dataset.value;
                        if (cls.includes('accuracy-btn')) this.answers.accuracy = btn.dataset.value;
                        this.render();
                    });
                });
                document.getElementById('notSureBtn')?.addEventListener('click', () => {
                    this.step = 'complexity-helper';
                    this.render();
                });
                document.getElementById('recommendBtn')?.addEventListener('click', () => {
                    this.step = 'result';
                    this.render();
                });
                document.querySelector('.complexity-no')?.addEventListener('click', () => {
                    this.helperAnswers[['couldDoManually', 'wouldSonnetWork', 'researchNeeded', 'complexReasoning'][this.complexityHelperStep]] = false;
                    this.complexityHelperStep++;
                    this.render();
                });
                document.querySelector('.complexity-yes')?.addEventListener('click', () => {
                    this.helperAnswers[['couldDoManually', 'wouldSonnetWork', 'researchNeeded', 'complexReasoning'][this.complexityHelperStep]] = true;
                    this.complexityHelperStep++;
                    this.render();
                });
                document.getElementById('backBtn')?.addEventListener('click', () => {
                    this.step = 'questions';
                    this.render();
                });
                document.getElementById('copyBtn')?.addEventListener('click', () => {
                    this.copyPrompt();
                });
                document.getElementById('resetBtn')?.addEventListener('click', () => {
                    this.reset();
                });
            }
        }

        new ClaudeAdvisor();
    </script>
</body>
</html>
